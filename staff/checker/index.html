<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signature Checker — Tandem Staff</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        *:focus {
            outline: none;
        }

        :root {
            --bg: #0d0d0f;
            --surface: #141417;
            --surface2: #1c1c21;
            --border: rgba(255, 255, 255, 0.07);
            --border2: rgba(255, 255, 255, 0.12);
            --text: rgba(255, 255, 255, 0.88);
            --muted: rgba(255, 255, 255, 0.38);
            --muted2: rgba(255, 255, 255, 0.20);
            --accent: #7c6ef5;
            --ok: #34d399;
            --ok-bg: rgba(52, 211, 153, 0.08);
            --ok-border: rgba(52, 211, 153, 0.22);
            --fail: #f87171;
            --fail-bg: rgba(248, 113, 113, 0.08);
            --fail-border: rgba(248, 113, 113, 0.22);
            --warn: #fbbf24;
            --warn-bg: rgba(251, 191, 36, 0.08);
        }

        html,
        body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: "Inter", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── LAYOUT ── */
        .wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 56px 24px 80px;
        }

        /* ── HEADER ── */
        .hdr {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 48px;
        }

        .hdr-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(124, 110, 245, 0.12);
            border: 1px solid rgba(124, 110, 245, 0.25);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .hdr-badge svg {
            width: 10px;
            height: 10px;
        }

        .hdr-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .hdr-sub {
            margin-top: 4px;
            font-size: 13px;
            color: var(--muted);
        }

        /* ── DROP ZONE ── */
        #drop-zone {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            min-height: 200px;
            border: 1.5px dashed var(--border2);
            border-radius: 16px;
            background: var(--surface);
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s;
            padding: 40px 24px;
            text-align: center;
        }

        #drop-zone:hover,
        #drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(124, 110, 245, 0.04);
        }

        #drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .dz-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(124, 110, 245, 0.10);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .dz-icon svg {
            width: 22px;
            height: 22px;
        }

        .dz-label {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .dz-hint {
            font-size: 12px;
            color: var(--muted);
        }

        .dz-ext {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.06);
            font-family: "JetBrains Mono", monospace;
            font-size: 11px;
            color: var(--muted);
        }

        /* ── RESULT CARD ── */
        #result {
            display: none;
            margin-top: 28px;
        }

        #result.visible {
            display: block;
        }

        .rc-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 20px;
            border-radius: 14px 14px 0 0;
            border: 1px solid var(--border2);
            border-bottom: none;
            background: var(--surface);
        }

        .rc-header.ok {
            border-color: var(--ok-border);
            background: var(--ok-bg);
        }

        .rc-header.fail {
            border-color: var(--fail-border);
            background: var(--fail-bg);
        }

        .rc-status-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .rc-header.ok .rc-status-icon {
            background: rgba(52, 211, 153, 0.15);
            color: var(--ok);
        }

        .rc-header.fail .rc-status-icon {
            background: rgba(248, 113, 113, 0.15);
            color: var(--fail);
        }

        .rc-status-icon svg {
            width: 18px;
            height: 18px;
        }

        .rc-status-text {
            flex: 1;
        }

        .rc-status-title {
            font-size: 15px;
            font-weight: 700;
        }

        .rc-header.ok .rc-status-title {
            color: var(--ok);
        }

        .rc-header.fail .rc-status-title {
            color: var(--fail);
        }

        .rc-status-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ── META GRID ── */
        .rc-meta {
            border: 1px solid var(--border);
            border-top: none;
            background: var(--surface2);
            padding: 16px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px 24px;
        }

        .rc-meta-key {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .rc-meta-val {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            font-family: "JetBrains Mono", monospace;
            word-break: break-all;
        }

        /* ── CHECK ROWS ── */
        .rc-checks {
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 14px 14px;
            overflow: hidden;
        }

        .chk {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            transition: background 0.15s;
        }

        .chk:first-child {
            border-top: none;
        }

        .chk-indicator {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }

        .chk-indicator svg {
            width: 11px;
            height: 11px;
        }

        .chk.ok .chk-indicator {
            background: rgba(52, 211, 153, 0.15);
            color: var(--ok);
        }

        .chk.fail .chk-indicator {
            background: rgba(248, 113, 113, 0.15);
            color: var(--fail);
        }

        .chk.pending .chk-indicator {
            background: rgba(255, 255, 255, 0.06);
            color: var(--muted2);
        }

        .chk-body {
            flex: 1;
            min-width: 0;
        }

        .chk-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .chk-desc {
            font-size: 11.5px;
            color: var(--muted);
            margin-top: 2px;
            line-height: 1.5;
        }

        .chk-hash-row {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .chk-hash {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chk-hash-key {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--muted);
            flex-shrink: 0;
            width: 60px;
        }

        .chk-hash-val {
            font-family: "JetBrains Mono", monospace;
            font-size: 10.5px;
            color: var(--muted);
            word-break: break-all;
            flex: 1;
        }

        .chk.ok .chk-hash-val {
            color: var(--ok);
        }

        .chk.fail .chk-hash-val.computed {
            color: var(--fail);
        }

        /* ── RESET ── */
        #reset-btn {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 11px 20px;
            border: 1px solid var(--border2);
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            font-family: "Inter", sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }

        #reset-btn:hover {
            border-color: var(--border2);
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
        }

        #reset-btn svg {
            width: 14px;
            height: 14px;
        }

        /* ── ERROR ── */
        #parse-error {
            display: none;
            margin-top: 20px;
            padding: 14px 18px;
            border: 1px solid var(--fail-border);
            border-radius: 12px;
            background: var(--fail-bg);
            font-size: 13px;
            color: var(--fail);
        }

        #parse-error.visible {
            display: block;
        }
    </style>
</head>

<body>
    <div class="wrap">

        <!-- Header -->
        <div class="hdr">
            <div>
                <div class="hdr-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    Staff only
                </div>
                <div class="hdr-title" style="margin-top:10px">Signature Checker</div>
                <div class="hdr-sub">Верификация файлов подписи договоров <span style="font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.5">.tandemsign</span></div>
            </div>
        </div>

        <!-- Drop zone -->
        <div id="drop-zone">
            <input type="file" id="file-input" accept=".tandemsign,text/plain" />
            <div class="dz-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
            </div>
            <div>
                <div class="dz-label">Загрузите файл подписи</div>
                <div class="dz-hint" style="margin-top:6px">Перетащите или нажмите, чтобы выбрать &nbsp;<span class="dz-ext">.tandemsign</span></div>
            </div>
        </div>

        <!-- Parse error -->
        <div id="parse-error"></div>

        <!-- Result -->
        <div id="result">
            <div class="rc-header" id="rc-header">
                <div class="rc-status-icon" id="rc-icon"></div>
                <div class="rc-status-text">
                    <div class="rc-status-title" id="rc-title"></div>
                    <div class="rc-status-sub" id="rc-sub"></div>
                </div>
            </div>

            <div class="rc-meta" id="rc-meta"></div>

            <div class="rc-checks" id="rc-checks"></div>
        </div>

        <!-- Reset -->
        <button id="reset-btn" style="display:none" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10" />
                <path d="M3.51 15a9 9 0 1 0 .49-4" />
            </svg>
            Проверить другой файл
        </button>

    </div>

    <script src="/security/libs/tandemsign.js"></script>
    <script>
        (function () {
            'use strict';

            /* ─── Иконки ─── */
            var ICO_OK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
            var ICO_FAIL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
            var ICO_PENDING = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>';

            /* ─── HTML-экранирование ─── */
            function esc(s) {
                return String(s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            /* ─── Метаданные файла ─── */
            function renderMeta(sig) {
                var items = [
                    ['Agreement ID', sig.agreementId],
                    ['Signed At', sig.signedAt],
                    ['Algorithm', sig.algorithm],
                    ['Issuer', sig.issuer],
                    ['Format', sig.version],
                ];
                /* Env-Hash: показываем сокращённо (первые 16 символов + …) */
                if (sig.envHash) {
                    items.push(['Env-Hash', sig.envHash.slice(0, 16) + '…']);
                }
                return items.map(function (item) {
                    return '<div class="rc-meta-item">'
                        + '<div class="rc-meta-key">' + item[0] + '</div>'
                        + '<div class="rc-meta-val">' + esc(item[1]) + '</div>'
                        + '</div>';
                }).join('');
            }

            /* ─── HTML строка одного check ─── */
            function chkRow(state, label, desc, expected, computed) {
                var ico = state === 'ok' ? ICO_OK : state === 'fail' ? ICO_FAIL : ICO_PENDING;
                var hashes = computed !== undefined ? (
                    '<div class="chk-hash-row">'
                    + '<div class="chk-hash"><span class="chk-hash-key">Ожидается</span><span class="chk-hash-val">' + esc(expected) + '</span></div>'
                    + '<div class="chk-hash"><span class="chk-hash-key">Получено</span><span class="chk-hash-val computed">' + esc(computed) + '</span></div>'
                    + '</div>'
                ) : '';
                return '<div class="chk ' + state + '">'
                    + '<div class="chk-indicator">' + ico + '</div>'
                    + '<div class="chk-body">'
                    + '<div class="chk-label">' + label + '</div>'
                    + '<div class="chk-desc">' + desc + '</div>'
                    + hashes
                    + '</div></div>';
            }

            /* ─── Отрисовка результата ─── */
            async function renderResult(sig) {
                var result = document.getElementById('result');
                var rcHeader = document.getElementById('rc-header');
                var rcIcon = document.getElementById('rc-icon');
                var rcTitle = document.getElementById('rc-title');
                var rcSub = document.getElementById('rc-sub');
                var rcMeta = document.getElementById('rc-meta');
                var rcChecks = document.getElementById('rc-checks');

                /* Метаданные — сразу */
                rcMeta.innerHTML = renderMeta(sig);

                /* Отображаем плейсхолдер пока считаем */
                rcHeader.className = 'rc-header';
                rcIcon.innerHTML = ICO_PENDING;
                rcTitle.textContent = 'Верификация…';
                rcSub.textContent = 'Вычисляем хеши, подождите';
                rcChecks.innerHTML = chkRow('pending', 'Формат полей', 'Проверяем…')
                    + chkRow('pending', 'Хеш документа', 'Проверяем…')
                    + chkRow('pending', 'Контрольная сумма', 'Проверяем…')
                    + chkRow('pending', 'Верификационный токен', 'Проверяем…');
                result.classList.add('visible');
                document.getElementById('reset-btn').style.display = 'flex';

                /* Крипто-проверки и проверка формата */
                var checks = await TandemSign.verify(sig);
                var fmtIssues = TandemSign.validateFormat(sig);
                var fmtOk = fmtIssues.length === 0;
                var allOk = checks.every(function (c) { return c.ok; }) && fmtOk;

                rcHeader.className = 'rc-header ' + (allOk ? 'ok' : 'fail');
                rcIcon.innerHTML = allOk ? ICO_OK : ICO_FAIL;
                rcTitle.textContent = allOk
                    ? 'Подпись действительна'
                    : 'Подпись недействительна';
                rcSub.textContent = allOk
                    ? 'Все четыре проверки прошли успешно. Документ не был изменён после подписания.'
                    : 'Одна или несколько проверок не прошли. Файл мог быть подделан или повреждён.';

                var fmtDesc = fmtOk
                    ? 'Все поля (версия, ID, таймстамп, хеши, структура Full-Data) соответствуют спецификации TandemSign/1.0.'
                    : 'Нарушения: ' + fmtIssues.join(' • ');

                rcChecks.innerHTML = chkRow(fmtOk ? 'ok' : 'fail', 'Формат полей', fmtDesc)
                    + checks.map(function (c) {
                        return chkRow(
                            c.ok ? 'ok' : 'fail',
                            c.label,
                            c.desc,
                            c.expected,
                            c.ok ? undefined : c.computed
                        );
                    }).join('');
            }

            /* ─── Обработка файла ─── */
            async function handleFile(file) {
                var errEl = document.getElementById('parse-error');
                errEl.classList.remove('visible');
                document.getElementById('result').classList.remove('visible');

                if (!file) return;

                var text;
                try {
                    text = await file.text();
                } catch (e) {
                    errEl.textContent = 'Не удалось прочитать файл: ' + e.message;
                    errEl.classList.add('visible');
                    return;
                }

                var sig = TandemSign.parse(text);
                if (!sig) {
                    errEl.textContent = 'Файл не распознан. Убедитесь, что это корректный файл .tandemsign формата TandemSign/1.0.';
                    errEl.classList.add('visible');
                    return;
                }

                await renderResult(sig);
            }

            /* ─── Drag & drop ─── */
            var zone = document.getElementById('drop-zone');
            var input = document.getElementById('file-input');

            zone.addEventListener('dragover', function (e) {
                e.preventDefault();
                zone.classList.add('drag-over');
            });
            zone.addEventListener('dragleave', function () {
                zone.classList.remove('drag-over');
            });
            zone.addEventListener('drop', function (e) {
                e.preventDefault();
                zone.classList.remove('drag-over');
                var file = e.dataTransfer.files[0];
                if (file) handleFile(file);
            });
            input.addEventListener('change', function () {
                if (input.files[0]) handleFile(input.files[0]);
            });

            /* ─── Reset ─── */
            document.getElementById('reset-btn').addEventListener('click', function () {
                document.getElementById('result').classList.remove('visible');
                document.getElementById('parse-error').classList.remove('visible');
                document.getElementById('reset-btn').style.display = 'none';
                input.value = '';
            });
        })();
    </script>
</body>

</html>
