# Документация tandem-sites.ru

> Внутренняя документация для разработчиков студии **Tandem Sites**.
> Актуально на март 2026 г. При значительных изменениях — обновлять этот файл.

---

## 1. Обзор проекта

**Tandem Sites** — студия по разработке премиальных лендингов на чистом HTML/CSS/JS. Сайт является одновременно:

- **Витриной студии** (главная страница с описанием услуг и ценами)
- **Интерактивным портфолио** (Viewer — просмотрщик демо-проектов в iframe)
- **Юридическим инструментом** (страница договора с криптографической подписью)

**Ключевая философия:** никаких фреймворков и сборщиков — весь код на ванильном HTML/CSS/JS.

---

## 2. Стек и принципы разработки

| Категория    | Решение                                              |
|--------------|------------------------------------------------------|
| Языки        | HTML5, CSS3, ES2020+ (vanilla JS)                    |
| Фреймворки   | **Нет** — намеренно                                  |
| Сборщик      | **Нет** — файлы статические, деплоятся as-is         |
| Шрифты       | Google Fonts (Syne, Inter, Raleway, Exo 2)           |
| Хостинг      | GitHub Pages                                         |
| SW-стратегия | NO-CACHE passthrough                                 |
| Криптография | Web Crypto API (`SHA-256`, `AES-GCM`, `PBKDF2`, WebAuthn) |

**Правила:**
- Не добавлять зависимости без явной необходимости
- Поддерживать работу без JS там, где это разумно
- Всегда проверять в Chrome / Firefox / Safari на мобиле

---

## 4. Хостинг и деплой

Хостинг — **GitHub Pages**, ветка `main`. Автодеплой при каждом `git push`.

**Кастомный домен:** задаётся через файл `CNAME` в корне репозитория. Файл `CXNAME` — резервный алиас.

```bash
# Деплой
git add .
git commit -m "chore: update docs"
git push origin main
```

> **Важно:** репозиторий публичный. Не коммитить ключи, пароли, токены.

## 5. Главная страница — `index.htm`

### Full-page слайдер

Пять слайдов на CSS-переменных + JS-контроллер в `index.app.js`. Слайды переключаются колесом мыши, свайпом и стрелками.

```javascript
// Пример переключения слайда
function goTo(index) {
  currentSlide = Math.max(0, Math.min(index, SLIDES_TOTAL - 1));
  document.documentElement.style.setProperty('--slide', currentSlide);
  updateIndicators();
}
```

### Анимации и Canvas-эффекты

На первом слайде работает Canvas-анимация частиц. Автоматически отключается при `prefers-reduced-motion`.

### SEO и мета-разметка

- Open Graph (`og:title`, `og:description`, `og:image`)
- Twitter Card
- JSON-LD `Organization`

### PWA

Манифест подключён, Service Worker регистрируется при загрузке. Offline-страница отдаётся из кеша SW.

## 6. Service Worker — `sw.js`

### Стратегия кеширования

| Паттерн URL             | Стратегия          |
|-------------------------|--------------------|
| `/*` (общие ресурсы)    | Network-first      |
| `/viewer/works/*`       | Sandbox-guard      |
| Офлайн-фолбэк           | Cache-first        |

### Sandbox guard для `/viewer/works/*`

Прямой запрос к демо-проектам (не через iframe вьювера) перехватывается SW и редиректится на `/viewer/sandbox-escape-error/`.

```javascript
// sw.js — sandbox guard
self.addEventListener('fetch', event => {
  const url = new URL(event.request.url);
  if (url.pathname.startsWith('/viewer/works/')) {
    const referer = event.request.referrer;
    if (!referer.includes('/viewer/')) {
      event.respondWith(
        Response.redirect('/viewer/sandbox-escape-error/', 302)
      );
    }
  }
});
```

### Архитектура модулей

```

├── app.viewer.init.js      ← Bootstrap, связывание модулей
├── app.viewer.js           ← Основная логика iframe
├── app.viewer.loader.js    ← Логика загрузки / прелоад
├── app.viewer.mobile.js    ← Phone-режим
├── app.viewer.preload.js   ← SmartPreload

## 11. TandemSign — `/security/libs/tandemsign.js`

Криптографическая библиотека для создания и верификации цепочки подписи договора.

**Алгоритм:** `SHA-256` → `PBKDF2` → `AES-GCM`

```javascript
// Создание подписи
const signature = await TandemSign.create({
  contractId: 'CTR-2024-001',
  clientEmail: 'client@example.com',
  timestamp: Date.now()
});

// Верификация
const isValid = await TandemSign.verify(signature, publicKey);
```

<script>
/* ============================================================
   HELPERS
============================================================ */
function slugify(text) {
  return text
    .toLowerCase()
    .replace(/[^\wа-яёА-ЯЁ\s\-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .trim();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ============================================================
   RENDER
============================================================ */
function render() {
  const src = document.getElementById('md');
  if (!src) return;

  // Dedent — убираем общий отступ (если MD написан с отступом внутри <script>)
  let raw = src.textContent.replace(/^\n/, '');
  const indent = raw.match(/^(\s+)/)?.[1] ?? '';
  if (indent) raw = raw.split('\n').map(l => l.startsWith(indent) ? l.slice(indent.length) : l).join('\n');

  // Marked: базовые опции
  const html = marked.parse(raw.trim(), { gfm: true, breaks: true });
  const content = document.getElementById('content');
  content.innerHTML = html;

  // --- 1. Обработка заголовков: id + anchor ---
  const headings = content.querySelectorAll('h1,h2,h3,h4,h5,h6');
  const usedIds = {};
  headings.forEach(h => {
    let id = slugify(h.textContent);
    if (usedIds[id] != null) { usedIds[id]++; id += '-' + usedIds[id]; } else { usedIds[id] = 0; }
    h.id = id;
    const anchor = document.createElement('a');
    anchor.href = '#' + id;
    anchor.className = 'h-anchor';
    anchor.textContent = '#';
    anchor.onclick = e => { e.preventDefault(); h.scrollIntoView({ behavior: 'smooth' }); history.pushState(null, '', '#' + id); };
    h.appendChild(anchor);
  });

  // --- 2. Подсветка кода + обёртка с хедером ---
  const LANG_NAMES = {
    js: 'JavaScript', javascript: 'JavaScript',
    ts: 'TypeScript', typescript: 'TypeScript',
    html: 'HTML', htm: 'HTML',
    css: 'CSS', scss: 'SCSS', sass: 'SCSS',
    bash: 'Bash', sh: 'Shell', shell: 'Shell', zsh: 'Shell',
    json: 'JSON', yaml: 'YAML', toml: 'TOML', xml: 'XML',
    py: 'Python', python: 'Python',
    sql: 'SQL', php: 'PHP', java: 'Java',
    cs: 'C#', cpp: 'C++', c: 'C',
    rust: 'Rust', go: 'Go', kotlin: 'Kotlin', swift: 'Swift',
    rb: 'Ruby', ruby: 'Ruby', md: 'Markdown', markdown: 'Markdown',
    text: '', plain: '', plaintext: '',
  };
  const ICON_COPY  = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="square"><rect x="5" y="1" width="9" height="11"/><path d="M3 5H2a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1v-1" stroke-linejoin="miter"/></svg>`;
  const ICON_CHECK = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter"><polyline points="2,8 6,13 14,4"/></svg>`;

  content.querySelectorAll('pre > code').forEach(block => {
    const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
    const lang = langClass ? langClass.replace('language-', '').toLowerCase() : '';
    const isPlain = lang === 'text' || lang === 'plain' || lang === 'plaintext' || lang === '';

    if (!isPlain) {
      hljs.highlightElement(block);
    } else {
      block.classList.add('hljs'); // базовые стили без подсветки
    }

    const displayLang = Object.prototype.hasOwnProperty.call(LANG_NAMES, lang)
      ? LANG_NAMES[lang]
      : lang.toUpperCase();

    const pre = block.parentElement;
    const wrap = document.createElement('div');
    wrap.className = 'cb-wrap';

    const head = document.createElement('div');
    head.className = 'cb-head';
    head.innerHTML = `<span class="cb-lang">${escHtml(displayLang)}</span><button class="cb-copy" title="Копировать">${ICON_COPY}</button>`;
    head.querySelector('.cb-copy').addEventListener('click', function () {
      navigator.clipboard.writeText(block.textContent.replace(/\n$/, '')).then(() => {
        this.innerHTML = ICON_CHECK; this.classList.add('ok');
        setTimeout(() => { this.innerHTML = ICON_COPY; this.classList.remove('ok'); }, 1800);
      });
    });

    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(head);
    wrap.appendChild(pre);
  });

  // --- 3. Оборачиваем таблицы в scroll-обёртку ---
  content.querySelectorAll('table').forEach(tbl => {
    if (tbl.parentElement.classList.contains('tbl-wrap')) return;
    const wrap = document.createElement('div');
    wrap.className = 'tbl-wrap';
    tbl.parentNode.insertBefore(wrap, tbl);
    wrap.appendChild(tbl);
  });

  // --- 4. Строим TOC ---
  buildTOC(content);

  // --- 5. Scroll-spy ---
  initSpy();
}

/* ============================================================
   TABLE OF CONTENTS
============================================================ */
function buildTOC(content) {
  const toc  = document.getElementById('toc');
  const headings = content.querySelectorAll('h1,h2,h3,h4');
  toc.innerHTML = '';

  headings.forEach(h => {
    const level = parseInt(h.tagName[1]);
    const li    = document.createElement('li');
    const a     = document.createElement('a');
    a.href       = '#' + h.id;
    // берём весь текст заголовка (включая вложенные <code> и т.п.), без якоря «#»
    a.textContent = Array.from(h.childNodes)
      .filter(n => !(n.nodeType === 1 && n.classList.contains('h-anchor')))
      .map(n => n.textContent).join('').trim();
    a.className  = 'h' + level;
    a.dataset.id = h.id;
    a.addEventListener('click', e => {
      e.preventDefault();
      document.getElementById(a.dataset.id)?.scrollIntoView({ behavior: 'smooth' });
      if (window.innerWidth <= 768) toggleSidebar(false);
    });
    li.appendChild(a);
    toc.appendChild(li);
  });
}

/* ============================================================
   SCROLL SPY
============================================================ */
function initSpy() {
  const headings = document.querySelectorAll('#content h1,#content h2,#content h3,#content h4');
  if (!headings.length) return;

  const hdrH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-h')) || 48;

  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      document.querySelectorAll('#toc a').forEach(a => a.classList.remove('active'));
      const link = document.querySelector(`#toc a[data-id="${entry.target.id}"]`);
      if (link) {
        link.classList.add('active');
        // Прокручиваем TOC чтобы активная ссылка была видна
        link.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    });
  }, { rootMargin: `-${hdrH + 8}px 0px -55% 0px` });

  headings.forEach(h => obs.observe(h));
}

/* ============================================================
   SEARCH IN TOC
============================================================ */
function searchTOC(q) {
  const query = q.trim().toLowerCase();
  document.querySelectorAll('#toc li').forEach(li => {
    const a = li.querySelector('a');
    li.classList.toggle('hidden', !!query && !a.textContent.toLowerCase().includes(query));
  });
  const btn = document.getElementById('search-clear');
  if (btn) btn.classList.toggle('visible', q.length > 0);
}

function clearSearch() {
  const inp = document.getElementById('search-inp');
  if (!inp) return;
  inp.value = '';
  searchTOC('');
  inp.focus();
}

/* ============================================================
   SIDEBAR TOGGLE
============================================================ */
function toggleSidebar(state) {
  const sb  = document.getElementById('sidebar');
  const ov  = document.getElementById('overlay');
  const open = state !== undefined ? state : !sb.classList.contains('open');
  sb.classList.toggle('open', open);
  ov.classList.toggle('on',   open);
}

/* ============================================================
   BACK TO TOP
============================================================ */
const toTopBtn = document.getElementById('to-top');
window.addEventListener('scroll', () => {
  toTopBtn.classList.toggle('on', window.scrollY > 320);
}, { passive: true });
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

/* ============================================================
   INIT
============================================================ */
document.addEventListener('DOMContentLoaded', render);
</script>
